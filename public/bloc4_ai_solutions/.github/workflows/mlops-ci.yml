name: Aurora Tech Chromebook MLOps CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install scikit-learn joblib fastapi uvicorn pytest pydantic

    - name: Run Automated Quality Gate Tests
      run: |
        pytest -v
