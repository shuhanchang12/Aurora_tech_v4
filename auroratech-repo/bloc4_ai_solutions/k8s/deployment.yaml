apiVersion: apps/v1
kind: Deployment
metadata:
  name: margin-risk-prediction
  namespace: ml-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: margin-risk-prediction
  template:
    metadata:
      labels:
        app: margin-risk-prediction
    spec:
      containers:
      - name: margin-risk-api
        image: auroratech/margin-prediction:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: margin-risk-service
  namespace: ml-prod
spec:
  selector:
    app: margin-risk-prediction
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
